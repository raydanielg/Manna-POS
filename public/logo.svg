<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10B981;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#059669;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#047857;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#10B981" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="100" cy="100" r="90" fill="url(#logoGradient)" filter="url(#shadow)"/>
  
  <!-- House Icon -->
  <g transform="translate(50, 45)">
    <!-- House Body -->
    <path d="M0 50 L50 10 L100 50 L100 90 L0 90 Z" fill="white" opacity="0.95"/>
    
    <!-- Roof -->
    <path d="M0 50 L50 10 L100 50" fill="none" stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Door -->
    <rect x="40" y="55" width="20" height="35" rx="2" fill="#10B981"/>
    
    <!-- Windows -->
    <rect x="10" y="55" width="20" height="20" rx="2" fill="#10B981" opacity="0.7"/>
    <rect x="70" y="55" width="20" height="20" rx="2" fill="#10B981" opacity="0.7"/>
    
    <!-- Door Handle -->
    <circle cx="56" cy="72" r="2" fill="white"/>
  </g>
  
  <!-- M Letter -->
  <text x="100" y="165" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="white">M</text>
</svg>
